<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Cleaner Clock</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050505;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#stage{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle,#202020 0,#050505 72%)}
#clock{width:min(96vw,96vh);height:min(96vw,96vh);display:block}
#hud{position:fixed;right:12px;top:calc(12px + env(safe-area-inset-top));display:flex;gap:8px}
button{border:0;border-radius:999px;background:#ffffff22;color:white;font-size:20px;padding:10px 13px;backdrop-filter:blur(8px)}
#hint{position:fixed;left:12px;bottom:calc(10px + env(safe-area-inset-bottom));color:#ffffff88;font-size:12px}
</style>
</head>
<body>
<div id="stage"><canvas id="clock" width="1000" height="1000"></canvas></div>
<div id="hud"><button onclick="document.documentElement.requestFullscreen?.()">⛶</button></div>
<div id="hint">Cleaner draws, waits low opposite the minute hand, then cleans and redraws every minute.</div>
<script>
const c=document.getElementById("clock"),ctx=c.getContext("2d");
const CX=500,CY=500,R=455;
function lerp(a,b,t){return a+(b-a)*t} function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function smooth(t){return t*t*(3-2*t)} function angPoint(deg,len){let a=deg*Math.PI/180;return{x:CX+Math.sin(a)*len,y:CY-Math.cos(a)*len}}
function oppositeSeat(minAng){let a=(minAng+180)*Math.PI/180;return{x:CX+Math.sin(a)*360,y:CY-Math.cos(a)*360}}
function noisyLine(angle,len,progress,alpha,clear){
 progress=clamp(progress,0,1); if(progress<=0)return;
 let start=28,end=len*progress,pts=[];
 for(let i=0;i<=28;i++){let t=i/28,l=lerp(start,end,t),p=angPoint(angle,l);
  let wob=Math.sin(i*1.9+angle*.07)*3+Math.sin(i*.73+angle)*2,perp=(angle+90)*Math.PI/180;
  p.x+=Math.sin(perp)*wob;p.y-=Math.cos(perp)*wob;pts.push(p)}
 ctx.save();ctx.globalAlpha=alpha;ctx.lineWidth=clear?30:9;ctx.lineCap="round";ctx.lineJoin="round";
 ctx.strokeStyle=clear?"rgba(245,240,225,.9)":"#17120f";ctx.beginPath();
 pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.stroke();ctx.restore()
}
function drawFace(fogPatch){
 ctx.clearRect(0,0,1000,1000);ctx.fillStyle="#090909";ctx.fillRect(0,0,1000,1000);
 ctx.save();ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.clip();
 ctx.fillStyle="#e8debf";ctx.fillRect(0,0,1000,1000);
 ctx.save();ctx.globalAlpha=.40;
 for(let i=0;i<380;i++){let x=(i*97)%1000,y=(i*193)%1000;if((x-CX)*(x-CX)+(y-CY)*(y-CY)<R*R){ctx.fillStyle="rgba(255,255,255,.045)";ctx.beginPath();ctx.arc(x,y,(i%7)+2,0,Math.PI*2);ctx.fill()}}
 ctx.restore();
 if(fogPatch&&fogPatch.alpha>0)noisyLine(fogPatch.angle,405,1,fogPatch.alpha,true);
 for(let i=0;i<60;i++){let a=i*6*Math.PI/180,major=i%5===0,q=i%15===0,r1=q?395:major?412:430,r2=448;
  ctx.strokeStyle="#17120f";ctx.lineWidth=q?10:major?6:2;ctx.beginPath();ctx.moveTo(CX+Math.sin(a)*r1,CY-Math.cos(a)*r1);ctx.lineTo(CX+Math.sin(a)*r2,CY-Math.cos(a)*r2);ctx.stroke()}
 ctx.fillStyle="#17120f";ctx.font="60px Georgia";ctx.textAlign="center";ctx.textBaseline="middle";
 for(let n=1;n<=12;n++){let p=angPoint(n*30,350);ctx.fillText(n,p.x,p.y+3)}
 ctx.restore();ctx.strokeStyle="#070707";ctx.lineWidth=28;ctx.beginPath();ctx.arc(CX,CY,R+10,0,Math.PI*2);ctx.stroke();
 ctx.strokeStyle="#333";ctx.lineWidth=4;ctx.beginPath();ctx.arc(CX,CY,R+24,0,Math.PI*2);ctx.stroke()
}
function drawHourHand(date){let h=date.getHours()%12,m=date.getMinutes(),s=date.getSeconds(),a=(h+m/60+s/3600)*30,p=angPoint(a,235);
 ctx.strokeStyle="#18120f";ctx.lineWidth=16;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(p.x,p.y);ctx.stroke()}
function drawCleaner(x,y,scale,pose,alpha){
 ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);ctx.scale(scale,scale);
 ctx.fillStyle="rgba(0,0,0,.62)";ctx.fillRect(-58,35,34,38);ctx.beginPath();ctx.arc(-41,35,17,Math.PI,0);ctx.strokeStyle="rgba(0,0,0,.62)";ctx.lineWidth=5;ctx.stroke();
 ctx.fillStyle="rgba(0,0,0,.68)";ctx.beginPath();ctx.ellipse(0,-94,28,34,0,0,Math.PI*2);ctx.fill();ctx.fillRect(-31,-62,62,105);ctx.fillRect(-25,38,18,68);ctx.fillRect(9,38,18,68);ctx.fillRect(-22,-122,38,10);ctx.fillRect(6,-119,34,8);
 ctx.strokeStyle="rgba(0,0,0,.68)";ctx.lineWidth=16;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(-28,-35);ctx.lineTo(-46,40);ctx.stroke();
 let reach=pose.reach||0;ctx.beginPath();ctx.moveTo(28,-36);ctx.lineTo(28+reach*75,-36-reach*100);ctx.stroke();
 if(pose.clean){ctx.fillStyle="rgba(35,35,35,.5)";ctx.beginPath();ctx.ellipse(28+reach*75,-36-reach*100,24,18,-.6,0,Math.PI*2);ctx.fill()}
 else if(reach>.2){ctx.strokeStyle="rgba(0,0,0,.75)";ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(28+reach*72,-36-reach*96);ctx.lineTo(28+reach*90,-36-reach*118);ctx.stroke()}
 ctx.restore()
}
function frame(){
 const now=new Date(),sec=now.getSeconds()+now.getMilliseconds()/1000,m=now.getMinutes(),oldAng=m*6,nextAng=((m+1)%60)*6;
 let drawProgress=1,oldAlpha=1,newProgress=0,newAlpha=0,clearAlpha=0,seat=oppositeSeat(oldAng),cleaner={x:seat.x,y:seat.y+32,scale:.65,pose:{reach:0,clean:false},alpha:.72};
 if(sec<5){let t=smooth(sec/5),end=angPoint(oldAng,260),start=oppositeSeat(oldAng);drawProgress=t;cleaner={x:lerp(start.x,end.x,t),y:lerp(start.y+30,end.y+55,t),scale:.78,pose:{reach:t,clean:false},alpha:.72}}
 else if(sec<55){drawProgress=1}
 else if(sec<58.3){let t=smooth((sec-55)/3.3),start=oppositeSeat(oldAng),end=angPoint(oldAng,300);drawProgress=1-t;oldAlpha=1-t*.9;clearAlpha=.9;cleaner={x:lerp(start.x,end.x,t),y:lerp(start.y+30,end.y+55,t),scale:.8,pose:{reach:1,clean:true},alpha:.75}}
 else{let t=smooth((sec-58.3)/1.7),end=angPoint(nextAng,260),start=oppositeSeat(nextAng);drawProgress=0;oldAlpha=0;clearAlpha=lerp(.85,.18,t);newProgress=t;newAlpha=1;cleaner={x:lerp(end.x,start.x,t*.25),y:lerp(end.y+55,start.y+30,t*.25),scale:.78,pose:{reach:1-t*.2,clean:false},alpha:.72}}
 drawFace({angle:oldAng,alpha:clearAlpha});drawHourHand(now);noisyLine(oldAng,405,drawProgress,oldAlpha,false);noisyLine(nextAng,405,newProgress,newAlpha,false);
 ctx.fillStyle="#111";ctx.beginPath();ctx.arc(CX,CY,22,0,Math.PI*2);ctx.fill();drawCleaner(cleaner.x,cleaner.y,cleaner.scale,cleaner.pose,cleaner.alpha);
 ctx.save();ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.clip();ctx.fillStyle="rgba(255,255,255,.07)";ctx.fillRect(0,0,1000,1000);ctx.restore();requestAnimationFrame(frame)
}
frame();
</script>
</body>
</html>
