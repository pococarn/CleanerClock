<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>Cleaner Clock</title>
<style>
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#080808;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;touch-action:manipulation;}
  #stage{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at center,#181818 0,#050505 70%);} 
  .clockWrap{position:relative;width:min(94vw,94vh);height:min(94vw,94vh);max-width:860px;max-height:860px;}
  @media (orientation:landscape){.clockWrap{width:min(92vh,88vw);height:min(92vh,88vw)}}
  svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;}
  .face{fill:#f3f1f5;stroke:#191919;stroke-width:5;filter:drop-shadow(0 0 22px rgba(255,255,255,.10));}
  .tick{stroke:#1e1a18;stroke-linecap:butt}.minor{stroke-width:2}.major{stroke-width:7}.qtr{stroke-width:11}
  .hand{stroke:#211b16;stroke-linecap:round;filter:drop-shadow(0 2px 2px rgba(0,0,0,.35));}
  .hour{stroke-width:14}.minute{stroke-width:10}.ghost{stroke:#efeef2;stroke-width:18;stroke-linecap:round;opacity:0}
  .pin{fill:#1d1713}.glass{fill:url(#glass);opacity:.45;pointer-events:none}.rim{fill:none;stroke:#0b0b0b;stroke-width:8;opacity:.75}
  #cleaner{position:absolute;left:50%;top:50%;width:18%;height:52%;transform:translate(-50%,-37%);opacity:.44;filter:blur(3.2px);z-index:2;pointer-events:none;}
  #cleaner .head{position:absolute;left:38%;top:0;width:25%;aspect-ratio:1;border-radius:50%;background:#b4865d;box-shadow:0 0 12px #b4865d;}
  #cleaner .body{position:absolute;left:28%;top:18%;width:44%;height:38%;border-radius:34% 34% 20% 20%;background:#2854b8;box-shadow:0 0 18px #2854b8;}
  #cleaner .leg{position:absolute;top:53%;width:14%;height:42%;border-radius:10px;background:#33436b;transform-origin:top center;box-shadow:0 0 14px #33436b;}
  #cleaner .lleg{left:35%;transform:rotate(8deg)}#cleaner .rleg{right:35%;transform:rotate(-8deg)}
  #cleaner .arm{position:absolute;left:48%;top:23%;width:11%;height:35%;border-radius:12px;background:#294fb0;transform-origin:top center;box-shadow:0 0 14px #294fb0;}
  #cleaner .armL{left:34%;transform:rotate(var(--armAng,-48deg));height:42%;}.armR{left:56%;transform:rotate(18deg)}
  #cleaner .rag{position:absolute;left:7%;top:26%;width:21%;height:12%;border-radius:50%;background:#caa06f;box-shadow:0 0 18px #caa06f;transform:translate(var(--ragX,0),var(--ragY,0));}
  #hud{position:fixed;right:12px;top:calc(12px + env(safe-area-inset-top));z-index:20;display:flex;gap:8px}.btn{border:0;border-radius:999px;background:rgba(255,255,255,.14);color:white;padding:10px 13px;font-size:20px;backdrop-filter:blur(8px)}
  #panel{position:fixed;right:12px;top:70px;background:rgba(15,15,15,.88);color:white;border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:14px;width:260px;z-index:21;display:none}.row{margin:10px 0}label{display:block;font-size:13px;opacity:.8;margin-bottom:4px}input,select{width:100%;box-sizing:border-box;font-size:17px;border-radius:10px;border:0;padding:8px}small{opacity:.7}
  .hint{position:fixed;left:12px;bottom:calc(8px + env(safe-area-inset-bottom));color:#fff9;font-size:12px;z-index:10}
</style>
</head>
<body>
<div id="stage">
  <div class="clockWrap" id="wrap">
    <div id="cleaner"><div class="head"></div><div class="body"></div><div class="leg lleg"></div><div class="leg rleg"></div><div class="arm armL"></div><div class="arm armR"></div><div class="rag"></div></div>
    <svg viewBox="0 0 1000 1000" aria-label="analog cleaner clock">
      <defs><radialGradient id="glass"><stop offset="0" stop-color="#fff" stop-opacity=".12"/><stop offset=".75" stop-color="#fff" stop-opacity=".04"/><stop offset="1" stop-color="#fff" stop-opacity=".18"/></radialGradient></defs>
      <circle class="face" cx="500" cy="500" r="470"/>
      <g id="ticks"></g>
      <line id="hourHand" class="hand hour" x1="500" y1="500" x2="500" y2="250"/>
      <line id="eraser" class="ghost" x1="500" y1="500" x2="500" y2="90"/>
      <line id="minuteHand" class="hand minute" x1="500" y1="500" x2="500" y2="105"/>
      <circle class="pin" cx="500" cy="500" r="21"/>
      <circle class="glass" cx="500" cy="500" r="468"/><circle class="rim" cx="500" cy="500" r="472"/>
    </svg>
  </div>
</div>
<div id="hud"><button class="btn" id="fs">⛶</button><button class="btn" id="cog">⚙︎</button></div>
<div id="panel">
 <div class="row"><label>Time source</label><select id="mode"><option value="device">Device time</option><option value="manual">Manual time</option></select></div>
 <div class="row"><label>Manual time</label><input id="manual" type="time" step="1"></div>
 <div class="row"><label>Clock size</label><input id="size" type="range" min="70" max="98" value="92"></div>
 <div class="row"><label>Cleaner opacity</label><input id="op" type="range" min="20" max="65" value="44"></div>
 <small>Minute hand is drawn during the minute, then from 55 seconds it gets cleaned and redrawn to the next minute.</small>
</div>
<div class="hint">Turn iPhone sideways • Add to Home Screen for best full screen</div>
<script>
const ticks=document.getElementById('ticks');
for(let i=0;i<60;i++){const a=i*6*Math.PI/180, major=i%5===0, q=i%15===0; const r1=q?418:major?426:440, r2=462; const x1=500+Math.sin(a)*r1,y1=500-Math.cos(a)*r1,x2=500+Math.sin(a)*r2,y2=500-Math.cos(a)*r2; const l=document.createElementNS('http://www.w3.org/2000/svg','line'); l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);l.setAttribute('class','tick '+(q?'qtr':major?'major':'minor'));ticks.appendChild(l)}
const hourHand=document.getElementById('hourHand'), minuteHand=document.getElementById('minuteHand'), eraser=document.getElementById('eraser'), cleaner=document.getElementById('cleaner'), wrap=document.getElementById('wrap');
const mode=document.getElementById('mode'), manual=document.getElementById('manual'), panel=document.getElementById('panel');
document.getElementById('cog').onclick=()=>panel.style.display=panel.style.display==='block'?'none':'block';
document.getElementById('fs').onclick=()=>document.documentElement.requestFullscreen?.();
document.getElementById('size').oninput=e=>{wrap.style.width=wrap.style.height=`min(${e.target.value}vw,${e.target.value}vh)`};
document.getElementById('op').oninput=e=>cleaner.style.opacity=e.target.value/100;
function point(angleDeg,len){const a=angleDeg*Math.PI/180;return [500+Math.sin(a)*len,500-Math.cos(a)*len]}
function setLine(el,angle,len){const [x,y]=point(angle,len);el.setAttribute('x2',x);el.setAttribute('y2',y)}
function timeNow(){let d=new Date(); if(mode.value==='manual'&&manual.value){let [h,m,s=0]=manual.value.split(':').map(Number); const elapsed=(Date.now()/1000)%86400; const base=h*3600+m*60+s; d=new Date(); d.setHours(0,0,0,0); d=new Date(d.getTime()+(base+elapsed%60)*1000)} return d}
function loop(){const d=timeNow(); const h=d.getHours()%12,m=d.getMinutes(),s=d.getSeconds()+d.getMilliseconds()/1000; const nextM=(m+1)%60;
 const hourAng=(h+m/60+s/3600)*30; setLine(hourHand,hourAng,250);
 let minAng=m*6; let visible=1, eraseOp=0;
 if(s<55){ // drawn minute hand stays at current minute mark
   minAng=m*6; visible=1; eraseOp=0;
 } else { // cleaner wipes old line and starts placing the next line
   const t=(s-55)/5; visible=Math.max(0,1-t*1.35); eraseOp=Math.sin(Math.PI*t)*.55; minAng=t<.65?m*6:nextM*6;
 }
 minuteHand.style.opacity=visible; setLine(minuteHand,minAng,395); eraser.style.opacity=eraseOp; setLine(eraser,m*6,405);
 // cleaner straight-on at centre; only rag/arm moves to old minute near 55s, then new minute
 const workAng=(s<55?m*6:(s<58.2?m*6:nextM*6)); const rad=(workAng-90)*Math.PI/180; const rx=Math.cos(rad)*42, ry=Math.sin(rad)*42-8; cleaner.style.setProperty('--ragX',rx+'px'); cleaner.style.setProperty('--ragY',ry+'px'); cleaner.style.setProperty('--armAng',(workAng-170)+'deg');
 requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
